<!DOCTYPE html>
<html>

<body>
	<label for="streamTitle">Stream Title</label>
	<input id="streamTitle"><br>

	<label for="headline">Headline</label>
	<input id="Headline"><br>

	<label for="countdownState">Countdown Type:</label>
	<select id="countdownState">
		<option value="Starting In">Starting In</option>
		<option value="Back In">Back In</option>
		<option value="Ending Soon">Ending Soon</option>
	</select><br>

	<label for="countdownTime">Target Time:</label>
	<input type="datetime-local" id="countdownTime"><br>

	<br><br>
	<label for="tickerLines">News Ticker</label> <br>
	<input id="ticker1", input style="width: 300px;"> <br>
	<input id="ticker2", input style="width: 300px;"> <br>
	<input id="ticker3", input style="width: 300px;"> <br>
	<input id="ticker3", input style="width: 300px;"> <br>
	<input id="ticker4", input style="width: 300px;"> <br>
	<input id="ticker5", input style="width: 300px;"> <br>
	<input id="ticker6", input style="width: 300px;"> <br>
	<input id="ticker7", input style="width: 300px;"> <br>
	<input id="ticker8", input style="width: 300px;"> <br><br>
	<button id="update" onclick="updateNewsTicker()">Save Settings</button>
</body>
<script>	

	const newsTicker = nodecg.Replicant("newsTicker")

	function updateNewsTicker() {

		let tickerLines = [];
		for (let i = 1; i < 9; i++) {
			if (document.getElementById(`ticker${i}`).value != "") {
				tickerLines.push(document.getElementById(`ticker${i}`).value);
			}
		}

		const ticker = {
			streamTitle: document.getElementById("streamTitle").value,
			headline: document.getElementById("Headline").value,
			countdownState: document.getElementById("countdownState").value,
			countdownTime: document.getElementById("countdownTime").value,
			tickerLines: tickerLines,
		}
		console.log(ticker)

	nodecg.sendMessage('updateTicker', ticker);
	}
</script>
</html>
