        </div>
    </body>
    <script>
        const matchesRep = nodecg.Replicant("matchesRep")

        function updateMatchInfo() {

            for (match of matchesRep.value.matches) {
                if (!match.spotlight) {
                    continue
                }

                document.getElementById("subtitle").children[0].innerHTML = match.title

                for (let n = 0; n < 8; n++) {

                    if (n >= match.players.length) {
                        document.getElementById(`row${n+1}`).style.display = "none"
                        continue
                    }

                    player = match.players[n]

                    nat = document.getElementById(`row${n+1}nationality`).children[0]
                    if (player.flag) {
                        console.log(player.flag)
                        nat.src = `https://flagsapi.com/${player.flag}/flat/64.png`
                        nat.style.display = "block"
                    } else {
                        nat.style.display = "none"
                    }
                    document.getElementById(`row${n+1}player`).children[0].innerHTML = player.name
                    document.getElementById(`row${n+1}diff`).children[0].innerHTML = (player.diff<0) ? player.diff : (player.diff==0) ? "E" : "+" + player.diff
                    document.getElementById(`row${n+1}score`).children[0].innerHTML = player.score

                    document.getElementById(`row${n+1}`).style.display = "block"
                }
            }

        }

        NodeCG.waitForReplicants(matchesRep).then(() => {
            updateMatchInfo();

            matchesRep.on("change", updateMatchInfo);
        });
    </script>
