<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                position: absolute;
                overflow: hidden;
                margin: 0;
                border: 0;
                padding: 0;
            }

            #maincontainer {
                width: 2100px;
                height: 1180px;
                background-image: url("./bg.png");
                animation: shuffle 10s linear infinite;
            }
            @keyframes shuffle {
                0% {
                    transform: translate3d(0, 0, 0);
                }
                100% {
                    transform: translate3d(-150px, -50px, 0);
                }
            }
        </style>
    </head>
    <body>
        <div id="maincontainer"></div>
    </body>
</html>
